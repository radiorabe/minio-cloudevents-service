name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@479996126a091287dc3fd349786f6f8a6dd1b23c # v0.42.0
    with:
      image: ghcr.io/radiorabe/minioevents
      name: minioevents
      display-name: Convert MinIO-Events into CloudEvents
      tags: minimal rhel9 ubi9 rabe minio kafka cloudevents
      cosign-base-image-only: false
  mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@479996126a091287dc3fd349786f6f8a6dd1b23c # v0.42.0
